title: פיקוד העורף
views:
  - title: 🚨 מפה ואזעקות
    path: oref-map
    icon: mdi:shield-alert
    type: masonry
    cards:

      # ══════════════════════════════════════════
      # BANNER — סטטוס אזעקה ראשי
      # ══════════════════════════════════════════

      - type: markdown
        content: >
          {% set active = is_state('binary_sensor.oref_alert_active', 'on') %}
          {% set zones = states('sensor.oref_alert_zones_count') | int(0) %}
          {% set title = state_attr('sensor.oref_alert_status', 'title') | default('') %}
          {% if active %}
          <div style="display:flex;align-items:center;justify-content:space-between;direction:rtl;font-family:'Heebo',sans-serif;padding:4px 0;">
            <div style="display:flex;align-items:center;gap:12px;">
              <ha-icon icon="mdi:alert-octagon" style="color:#ff2020;--mdc-icon-size:28px;"></ha-icon>
              <span style="font-size:1.4em;font-weight:900;color:#ff4040;">🚨 אזעקה פעילה!</span>
            </div>
            <div style="text-align:left;color:#ff9090;">
              <div style="font-size:1em;font-weight:700;">{{ title }}</div>
              <div style="font-size:0.8em;opacity:0.8;">{{ zones }} אזורים מוזהרים</div>
            </div>
          </div>
          {% else %}
          <div style="display:flex;align-items:center;gap:12px;direction:rtl;font-family:'Heebo',sans-serif;padding:4px 0;">
            <ha-icon icon="mdi:shield-check" style="color:#00e676;--mdc-icon-size:26px;"></ha-icon>
            <span style="font-size:1.3em;font-weight:800;color:#00e676;">&#10003; אין אזעקות פעילות</span>
            <span style="margin-right:auto;font-size:0.8em;color:#40aa70;opacity:0.7;">{{ now().strftime('%H:%M:%S') }}</span>
          </div>
          {% endif %}
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #041a0e, #07291a) !important;
              border: 2px solid rgba(0,200,100,0.4) !important;
              border-radius: 14px !important;
              padding: 14px 20px !important;
            }

      # ══════════════════════════════════════════
      # IFRAME — מפת פיקוד העורף
      # ══════════════════════════════════════════

      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              <div style="display:flex;align-items:center;justify-content:space-between;direction:rtl;font-family:'Heebo',sans-serif;">
                <div style="display:flex;align-items:center;gap:8px;">
                  <ha-icon icon="mdi:map" style="color:#8ab4ff;--mdc-icon-size:20px;"></ha-icon>
                  <span style="font-size:0.95em;font-weight:700;color:#8ab4ff;">מפת ישראל — פיקוד העורף</span>
                </div>
                <a href="https://www.oref.org.il/11226-he/Pakar.aspx" target="_blank"
                   style="font-size:0.75em;color:#4a6fa5;text-decoration:none;">
                  פתח באתר &#8599;
                </a>
              </div>
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(90deg, #0a0f1e, #0f1628) !important;
                  border: 1px solid rgba(100,150,255,0.3) !important;
                  border-bottom: none !important;
                  border-radius: 12px 12px 0 0 !important;
                  padding: 10px 18px !important;
                  box-shadow: none !important;
                  margin-bottom: 0 !important;
                }

          - type: iframe
            url: "https://www.oref.org.il/11226-he/Pakar.aspx"
            aspect_ratio: "65%"
            card_mod:
              style: |
                ha-card {
                  border-radius: 0 0 12px 12px !important;
                  border: 1px solid rgba(100,150,255,0.3) !important;
                  border-top: none !important;
                  overflow: hidden !important;
                  margin-top: 0 !important;
                }

      # ══════════════════════════════════════════
      # ZONES — אזורים מוזהרים
      # ══════════════════════════════════════════

      - type: markdown
        content: >
          {% set active = is_state('binary_sensor.oref_alert_active', 'on') %}
          {% set areas = state_attr('sensor.oref_alert_status', 'areas') %}
          {% set category = states('sensor.oref_alert_category') %}
          {% set desc = state_attr('sensor.oref_alert_status', 'desc') %}

          <div style="direction:rtl;font-family:'Heebo',sans-serif;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(200,100,255,0.2);">
            <ha-icon icon="mdi:map-marker-alert" style="color:#c864ff;--mdc-icon-size:20px;"></ha-icon>
            <span style="font-size:0.95em;font-weight:700;color:#c864ff;">אזורים מוזהרים עכשיו</span>
            <span style="margin-right:auto;background:rgba(200,100,255,0.15);border:1px solid rgba(200,100,255,0.4);border-radius:20px;padding:2px 10px;font-size:0.75em;color:#c864ff;">
              {{ states('sensor.oref_alert_zones_count') }} אזורים
            </span>
          </div>
          {% if active and areas %}
          {% if category and category not in ['לא ידוע', '—'] %}
          <div style="margin-bottom:10px;padding:8px 12px;background:rgba(255,50,50,0.1);border-radius:8px;border-right:3px solid #ff3030;">
            <div style="font-size:0.75em;color:#ff7070;font-weight:600;">סוג אירוע</div>
            <div style="font-size:0.9em;color:#ffaaaa;margin-top:2px;">{{ category }}</div>
          </div>
          {% endif %}
          {% if desc %}
          <div style="margin-bottom:10px;padding:8px 12px;background:rgba(255,120,0,0.1);border-radius:8px;border-right:3px solid #ff8c00;">
            <div style="font-size:0.75em;color:#ffaa40;font-weight:600;">הנחיות</div>
            <div style="font-size:0.82em;color:#ffcc80;margin-top:2px;line-height:1.5;">{{ desc }}</div>
          </div>
          {% endif %}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px;">
          {% for area in areas %}
          <div style="background:rgba(255,40,40,0.12);border:1px solid rgba(255,60,60,0.35);border-radius:7px;padding:7px 10px;font-size:0.85em;color:#ffaaaa;">
            &#128205; {{ area }}
          </div>
          {% endfor %}
          </div>
          {% else %}
          <div style="text-align:center;padding:24px;color:#00e676;">
            <div style="font-size:2em;margin-bottom:8px;">&#128737;</div>
            <div style="font-weight:700;">האזור שקט</div>
            <div style="font-size:0.8em;opacity:0.6;margin-top:5px;">אין אזעקות פעילות כרגע</div>
          </div>
          {% endif %}
          </div>
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #0d0d1f, #0a1020) !important;
              border: 1px solid rgba(200,100,255,0.25) !important;
              border-radius: 12px !important;
              padding: 14px 18px !important;
            }

      # ══════════════════════════════════════════
      # QUICK LINKS
      # ══════════════════════════════════════════

      - type: horizontal-stack
        cards:
          - type: button
            name: אתר פיקוד העורף
            icon: mdi:web
            tap_action:
              action: url
              url_path: "https://www.oref.org.il"
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(135deg, #0d1525, #1a2540) !important;
                  border: 1px solid rgba(100,150,255,0.3) !important;
                  border-radius: 12px !important;
                  --paper-item-icon-color: #8ab4ff;
                }

          - type: button
            name: היסטוריית אזעקות
            icon: mdi:history
            tap_action:
              action: url
              url_path: "https://www.oref.org.il/11226-he/Pakar.aspx"
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(135deg, #1a0d25, #2a1540) !important;
                  border: 1px solid rgba(200,100,255,0.3) !important;
                  border-radius: 12px !important;
                  --paper-item-icon-color: #c864ff;
                }

          - type: button
            name: אפליקציית אורט
            icon: mdi:cellphone-alert
            tap_action:
              action: url
              url_path: "https://www.oref.org.il/1096-he/MabatLaAdam.aspx"
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(135deg, #1a0505, #2d0808) !important;
                  border: 1px solid rgba(255,100,100,0.3) !important;
                  border-radius: 12px !important;
                  --paper-item-icon-color: #ff7070;
                }

      # ══════════════════════════════════════════
      # STATS
      # ══════════════════════════════════════════

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.oref_alert_zones_count
            name: אזורים מוזהרים
            icon: mdi:map-marker-multiple
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(135deg, #0f1525, #151e35) !important;
                  border: 1px solid rgba(100,150,255,0.2) !important;
                  direction: rtl;
                }

          - type: custom:mushroom-entity-card
            entity: sensor.oref_alert_history_count
            name: אזעקות 24 שעות
            icon: mdi:history
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(135deg, #151020, #1e1530) !important;
                  border: 1px solid rgba(200,150,255,0.2) !important;
                  direction: rtl;
                }

          - type: custom:mushroom-entity-card
            entity: sensor.oref_alert_category
            name: סוג אירוע
            icon: mdi:shield-alert
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(135deg, #150a0a, #251010) !important;
                  border: 1px solid rgba(255,100,100,0.2) !important;
                  direction: rtl;
                }
